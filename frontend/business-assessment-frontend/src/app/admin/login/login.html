<div class="page-wrapper">

    <header class="header">
        <img src="websitelogo.png" alt="logo" class="logo">
        <span class="header-title">Admin Panel</span>
    </header>

    <div class="content-wrapper">
        <div class="login-area">

            <h2 class="login-heading">Admin Login</h2>

            <div class="form-group">
                <input type="text" placeholder="Username" class="input-field" [(ngModel)]="username">
            </div>

            <div class="form-group">
                <input type="password" placeholder="Password" class="input-field" [(ngModel)]="password">
            </div>

            @if (errorMessage) {
            <p style="color: #FF206E; font-size: 14px; margin: 8px 0 0 0;">{{ errorMessage }}</p>
            }

            <button class="login-btn" [disabled]="isLoading" (click)="login()">
                {{ isLoading ? 'Logging in...' : 'Login' }}
            </button>

        </div>
    </div>

</div>
